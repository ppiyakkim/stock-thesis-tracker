name: Update Charts

on:
  schedule:
    - cron: "0 1 * * *"       # 01:00 UTC every day
  workflow_dispatch:           # manual trigger from GitHub UI or manage page API

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MANAGE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate charts
        run: python src/generate.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html manage.html
          git add -A data/
          git diff --cached --quiet || \
            git commit -m "chore: auto-update charts [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git fetch origin main
          git rebase origin/main
          git push origin main
